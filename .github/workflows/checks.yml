name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-37.0 build-tools;36.0.0
      - uses: gradle/actions/setup-gradle@v6
      - name: Test and lint
        run: ./gradlew --no-daemon test lintDebug :app:verifyLegalInventory :app:verifyPrototypeRuntimeBoundary
      - name: Build development artifact
        run: ./gradlew --no-daemon :app:assembleDebug :app:lintRelease
      - name: Verify Play release gate
        shell: bash
        run: |
          if ./gradlew --no-daemon :app:assembleRelease; then
            echo "Play release gate unexpectedly passed before the VM runtime landed"
            exit 1
          fi
      - name: Verify Play execution boundary
        shell: bash
        run: |
          if grep -RInE --include='*.kt' --include='*.java' \
            'dalvik\.system\.|DexClassLoader|InMemoryDexClassLoader|PathClassLoader|DexFile|URLClassLoader|PackageInstaller|REQUEST_INSTALL_PACKAGES|ACTION_INSTALL_PACKAGE|application/vnd\.android\.package-archive|/system/bin/(sh|toybox)' \
            app/src/main agent/src/main tools/src/main; then
            echo "Forbidden Android runtime loader or host shell fallback found"
            exit 1
          fi
      - name: Verify 16 KB compatibility
        shell: bash
        run: |
          command -v readelf
          shopt -s nullglob
          for file in app/src/main/jniLibs/arm64-v8a/* app/src/main/jniLibs/x86_64/*; do
            while read -r alignment; do
              if (( alignment < 0x4000 )); then
                echo "$file has a LOAD segment aligned to $alignment"
                exit 1
              fi
            done < <(readelf -lW "$file" | awk '$1 == "LOAD" { print $NF }')
          done
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 app/build/outputs/apk/debug/app-debug.apk
