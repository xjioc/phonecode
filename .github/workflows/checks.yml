name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-37.0 build-tools;36.0.0
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify vendored artifacts
        run: shasum -a 256 --check VENDORED_CHECKSUMS
      - name: Test and lint
        run: ./gradlew --no-daemon test lintDebug
      - name: Build Play artifacts
        run: ./gradlew --no-daemon :app:lintRelease :app:assembleRelease :app:bundleRelease
      - name: Verify 16 KB compatibility
        shell: bash
        run: |
          command -v readelf
          shopt -s nullglob
          for file in app/src/main/jniLibs/arm64-v8a/* app/src/main/jniLibs/x86_64/*; do
            while read -r alignment; do
              if (( alignment < 0x4000 )); then
                echo "$file has a LOAD segment aligned to $alignment"
                exit 1
              fi
            done < <(readelf -lW "$file" | awk '$1 == "LOAD" { print $NF }')
          done
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 app/build/outputs/apk/release/app-release-unsigned.apk
